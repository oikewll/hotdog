name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential fakeroot dpkg rpm libarchive-tools python3 \
            libnss3 libgtk-3-0 libgbm1 libasound2t64 libxss1 \
            libxtst6 libxrandr2 libxcomposite1 libxdamage1 libxkbcommon0 libdrm2

      - name: Install dependencies
        run: npm ci

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA-256 checksums
        id: checksums
        working-directory: release
        run: |
          set -e
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -NoProfile -Command "
              Get-ChildItem -File -Exclude 'checksums.txt','latest*','*.yml','*.blockmap' |
                ForEach-Object {
                  $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
                  Add-Content -Path 'checksums.txt' -Value \"$h  $($_.Name)\"
                }
            "
          else
            for f in *; do
              case "$f" in
                checksums.txt|latest*|*.yml|*.blockmap) continue ;;
              esac
              [ -f "$f" ] || continue
              shasum -a 256 "$f" >> checksums.txt
            done
          fi
          cat checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hotdog-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.yml
            release/*.blockmap
            release/checksums.txt
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.yml
            release/*.blockmap
            release/checksums.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
